services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - KHANATE_TOKEN=${KHANATE_TOKEN:-khan-2026-secret}
      - KHANATE_DATA_DIR=/data
      - NODE_ENV=production
      - KHANATE_API_URL=http://host.docker.internal:19100
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /root/khanate/worlds:/data/worlds
      - /root/khanate/registry:/data/registry
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.khanate.rule=Host(`khanate.dotthedoor.com`)"
      - "traefik.http.routers.khanate.entrypoints=https"
      - "traefik.http.routers.khanate.tls=true"
      - "traefik.http.routers.khanate.tls.certresolver=letsencrypt"
      - "traefik.http.services.khanate.loadbalancer.server.port=3000"
